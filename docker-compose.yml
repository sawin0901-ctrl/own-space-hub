services:
  app:
    build:
      context: .
      target: runner
    container_name: gameplaza_app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gameplaza}:${POSTGRES_PASSWORD:-gameplaza}@postgres:5432/${POSTGRES_DB:-gameplaza}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "3000"
    command: sh -c "npx -y prisma@5.22.0 migrate deploy && node server.js"
    volumes:
      - uploads:/app/public/uploads

  worker:
    build:
      context: .
      target: worker
    container_name: gameplaza_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gameplaza}:${POSTGRES_PASSWORD:-gameplaza}@postgres:5432/${POSTGRES_DB:-gameplaza}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: gameplaza_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gameplaza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gameplaza}
      POSTGRES_DB: ${POSTGRES_DB:-gameplaza}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gameplaza}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gameplaza_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: gameplaza_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    container_name: gameplaza_certbot
    restart: unless-stopped
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

volumes:
  postgres_data:
  redis_data:
  uploads:
  certbot_webroot:
  certbot_certs:
